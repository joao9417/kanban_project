{% extends "base.html" %}
{% block title %}Confirm Delete — Engineering Kanban{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white border-bottom fw-semibold text-danger">
                <i class="bi bi-exclamation-triangle me-2"></i>Confirm Delete
            </div>
            <div class="card-body">
                <p>Are you sure you want to delete <strong>{{ object }}</strong>? This action cannot be undone.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash me-1"></i>Delete
                        </button>
                        <a href="javascript:history.back()" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
