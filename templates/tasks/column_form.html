{% extends "base.html" %}
{% block title %}{% if form.instance.pk %}Edit Column{% else %}New Column{% endif %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white border-bottom">
                <h5 class="mb-0 fw-bold">{% if form.instance.pk %}Edit Column{% else %}New Column{% endif %}</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Column Title</label>
                        {{ form.title }}
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Order</label>
                        {{ form.order }}
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i>Save
                        </button>
                        <a href="javascript:history.back()" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
