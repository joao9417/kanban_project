{% extends 'base.html' %}

{% block title %}Confirm Delete{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded shadow-md text-center">
    <h1 class="text-2xl font-bold mb-4 text-red-600">Are you sure?</h1>
    <p class="mb-6 text-gray-700">
        You are about to delete "<strong>{{ object }}</strong>". This action cannot be undone.
    </p>

    <form method="post">
        {% csrf_token %}
        <div class="flex justify-center space-x-4">
            <button type="submit" class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">
                Yes, delete it
            </button>
            <a href="javascript:history.back()"
                class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
